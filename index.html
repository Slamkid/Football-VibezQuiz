<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football & Vibez – Ball Knowledge Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00D46A;
    --dark: #0a0a0a;
    --card: #141414;
    --border: #222;
    --text: #f0f0f0;
    --muted: #888;
    --red: #FF3B30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,106,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }

  .screen { display: none; }
  .screen.active { display: block; }

  .intro-badge {
    display: inline-block;
    background: var(--green);
    color: var(--dark);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 18px;
  }

  .intro-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 12vw, 64px);
    line-height: 0.95;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .intro-title span { color: var(--green); }

  .intro-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .intro-meta { display: flex; gap: 20px; margin-bottom: 36px; }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--muted);
  }

  .meta-icon {
    width: 28px; height: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .btn-start {
    width: 100%;
    padding: 18px;
    background: var(--green);
    color: var(--dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 30px rgba(0,212,106,0.25);
  }

  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0,212,106,0.4); }

  .ball-deco {
    font-size: 80px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(0,212,106,0.3));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 10px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--green);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .q-counter {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 6vw, 32px);
    line-height: 1.15;
    margin-bottom: 24px;
    min-height: 80px;
  }

  .options-grid { display: grid; gap: 12px; }
  .options-grid.two-col { grid-template-columns: 1fr 1fr; }
  .options-grid.one-col { grid-template-columns: 1fr; }

  .opt-btn {
    padding: 16px 14px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.4;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: rgba(0,212,106,0.07);
    transform: translateY(-1px);
  }

  .opt-btn.correct { border-color: var(--green); background: rgba(0,212,106,0.15); color: var(--green); }
  .opt-btn.wrong { border-color: var(--red); background: rgba(255,59,48,0.1); color: var(--red); }
  .opt-btn:disabled { cursor: default; }

  .feedback-bar {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .feedback-bar.show { opacity: 1; }
  .feedback-bar.correct-fb { background: rgba(0,212,106,0.1); color: var(--green); border: 1px solid rgba(0,212,106,0.2); }
  .feedback-bar.wrong-fb { background: rgba(255,59,48,0.08); color: #ff6b63; border: 1px solid rgba(255,59,48,0.2); }

  .btn-next {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: transparent;
    border: 1.5px solid var(--green);
    color: var(--green);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
  }

  .btn-next.show { opacity: 1; pointer-events: auto; }
  .btn-next:hover { background: var(--green); color: var(--dark); }

  .result-badge-wrap { display: flex; justify-content: center; margin-bottom: 24px; }

  .result-badge {
    width: 110px; height: 110px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 40px;
    border: 3px solid;
    animation: pulse-badge 2s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 20px currentColor; }
    50% { box-shadow: 0 0 40px currentColor; }
  }

  .result-level {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 9vw, 44px);
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 8px;
    text-align: center;
  }

  .result-score { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 10px; }

  .score-chips { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }

  .chip {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .chip.hit { border-color: var(--green); background: rgba(0,212,106,0.15); color: var(--green); }
  .chip.miss { border-color: var(--border); color: var(--muted); }

  .result-desc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.7;
    color: #ccc;
    margin-bottom: 24px;
    text-align: center;
  }

  .result-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .btn-retry {
    width: 100%;
    padding: 16px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-retry:hover { border-color: var(--green); color: var(--green); }
  .share-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .quiz-content { animation: slideIn 0.3s ease; }
</style>
</head>
<body>
<div class="container">

  <div class="screen active" id="screen-intro">
    <span class="ball-deco">⚽</span>
    <div class="intro-badge">Football & Vibez 🔥</div>
    <h1 class="intro-title">What's Your<br><span>Ball<br>Knowledge</span><br>Level?</h1>
    <p class="intro-sub">7 questions. No VAR. No googling.<br>Let's see if you really know the game.</p>
    <div class="intro-meta">
      <div class="meta-item"><div class="meta-icon">❓</div>7 Questions</div>
      <div class="meta-item"><div class="meta-icon">🏅</div>4 Levels</div>
      <div class="meta-item"><div class="meta-icon">⚡</div>2 mins</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">TAP TO KICK OFF →</button>
  </div>

  <div class="screen" id="screen-quiz">
    <div class="quiz-content" id="quiz-content">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="q-counter" id="q-counter">Question 1 of 7</div>
      <div class="q-text" id="q-text"></div>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback-bar" id="feedback-bar"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">NEXT →</button>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div id="result-content"></div>
  </div>

</div>

<script>
const questions = [
  {
    q: "Who is the GOAT?",
    options: ["Lionel Messi", "Cristiano Ronaldo"],
    correct: [1],
    cols: "two-col",
    correctFb: "Normally! Nobody touches Ororo, ykb.",
    wrongFb: "Messi una, industry baby. Otr, please."
  },
  {
    q: "Last minute pen to save your life, who takes it?",
    options: ["Bruno Fernandes", "Karim Benzema"],
    correct: [1],
    cols: "two-col",
    correctFb: "I see that you love living, sabi boy.",
    wrongFb: "Penandes ke, rest in peace o."
  },
  {
    q: "Overrated D'or: Pick your winner.",
    options: ["Martin Odegbami", "Odegbami Martin"],
    correct: [0, 1],
    cols: "two-col",
    correctFb: "Ko da rara, I can't even lie.",
    wrongFb: "Anyone you choose, he's still azz 😭"
  },
  {
    q: "Ronaldo 1000 goals + Portugal WC in 2026, Amen?",
    options: ["Amen, Amen, Fire!!!", "God forbid bad thing"],
    correct: [0],
    cols: "two-col",
    correctFb: "Sabi boy, see you in America joor!",
    wrongFb: "No worry, God go spare your life to witness it. 🙏"
  },
  {
    q: "Arsenal EPL or Tinubu 2nd term?",
    options: ["Arsenal EPL, COYG!", "Tinubu 2nd term, abeg"],
    correct: [1],
    cols: "two-col",
    correctFb: "Batified joorrr, on his mandate we stand. #BAT2027!",
    wrongFb: "I no blame you, tbh. I really don't."
  },
  {
    q: "Revive one to reach their full potential:",
    options: ["Bamidele Alli", "Ansu Fati"],
    correct: [0],
    cols: "two-col",
    correctFb: "You were there, mehn. 1 of 1, nobody like him.",
    wrongFb: "Fati, as how? Someone that peaked at 17."
  },
  {
    q: "I am an English club and I like to think that I am more important than I am, when I'm really not all that. Who am I?",
    options: ["Chelsea", "Manchester United"],
    correct: [0, 1],
    cols: "two-col",
    optionFb: [
      "Still fielding Neto and Delap after spending 2bn? Pride of London isonu.",
      "0 League titles and 0 UCLs in more than a decade. Basically just Arsenal with more fans, tbh."
    ]
  }
];

const levels = [
  { min:0, max:2, name:"TEMPORARY'S TWIN", emoji:"😭", tag:"Zero Ball Knowledge", color:"#CD7F32",
    desc:"You and Temporary, no ball knowledge at all. Just exit the gc." },
  { min:3, max:4, name:"KENE", emoji:"🦺", tag:"Not That Guy Mehn", color:"#888888",
    desc:"I'm sure all you do is send stickers and avoid serious ball conversations, do better please." },
  { min:5, max:6, name:"OJAY", emoji:"⭐", tag:"You Try Small", color:"#C0C0C0",
    desc:"You did well, but you're not HIM yet. Keep pushing." },
  { min:7, max:7, name:"SLAMMO!", emoji:"🏆", tag:"You're the GOAT!", color:"#FFD700",
    desc:"YOU ARE HIM! Ball knowledge lord. 7/7? You too sabi walai." }
];

let current = 0, score = 0, answers = [], answered = false;

function startQuiz() {
  current = 0; score = 0; answers = []; answered = false;
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-bar').style.width = `${(current / questions.length) * 100}%`;

  const grid = document.getElementById('options-grid');
  grid.className = `options-grid ${q.cols}`;
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedback-bar').className = 'feedback-bar';
  document.getElementById('feedback-bar').textContent = '';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.className = 'btn-next';
  nextBtn.textContent = current === questions.length - 1 ? 'SEE MY RESULT 🏆' : 'NEXT →';

  const content = document.getElementById('quiz-content');
  content.style.animation = 'none';
  content.offsetHeight;
  content.style.animation = 'slideIn 0.3s ease';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const isCorrect = q.correct.includes(idx);

  q.correct.forEach(ci => btns[ci].classList.add('correct'));
  if (!isCorrect) btns[idx].classList.add('wrong');
  btns.forEach(b => b.disabled = true);

  if (isCorrect) score++;
  answers.push(isCorrect);

  const fb = document.getElementById('feedback-bar');
  fb.className = `feedback-bar show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  const msg = q.optionFb ? q.optionFb[idx] : (isCorrect ? q.correctFb : q.wrongFb);
  fb.textContent = (isCorrect ? '✅ ' : '❌ ') + msg;

  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
  if (!answered) return;
  current++;
  if (current >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('progress-bar').style.width = '100%';
  const level = levels.find(l => score >= l.min && score <= l.max);
  const chips = answers.map(hit =>
    `<div class="chip ${hit ? 'hit' : 'miss'}">${hit ? '✓' : '✗'}</div>`
  ).join('');

  document.getElementById('result-content').innerHTML = `
    <div style="text-align:center;margin-bottom:8px;font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">Your Result</div>
    <div class="result-badge-wrap">
      <div class="result-badge" style="color:${level.color};border-color:${level.color};">${level.emoji}</div>
    </div>
    <div class="result-level" style="color:${level.color}">${level.name}</div>
    <div class="result-score">${score} out of ${questions.length} correct</div>
    <div class="score-chips">${chips}</div>
    <div class="result-desc">
      <span class="result-tag" style="background:${level.color}22;color:${level.color};border:1px solid ${level.color}44">${level.tag}</span><br><br>
      ${level.desc}
    </div>
    <button class="btn-retry" onclick="startQuiz()">🔄 TRY AGAIN</button>
    <p class="share-note">Screenshot your result & drop it in the GC 📸🔥</p>
  `;
  showScreen('screen-result');
}
</script>
</body>
</html>
